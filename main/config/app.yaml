app:
  name: visual_companion_robot
  mode: development

runtime:
  display: ":0"
  log_level: INFO

# ── 后端选择 ──────────────────────────────────────────────────────
# 每个模块可选 cloud（云端 API）或 local（板端 NPU/CPU 推理）。
backend:
  llm: cloud
  vision: cloud
  asr: local
  tts: local
  vad: local

# ── 本地模型路径 ──────────────────────────────────────────────────
model_paths:
  # YOLO 检测模型（RKNN 格式）
  yolo: models/yolo/yolov26n.rknn
  # 本地 LLM（GGUF 格式）
  llm: models/qwen/Qwen2.5-1.5B-Q4_K_M.gguf
  # 视觉小 LLM（GGUF 格式，用于 YOLO 结果 → 自然语言描述）
  vision_llm: models/qwen/Qwen2.5-0.5B-Q4_K_M.gguf
  # ONNX 模型目录（sherpa-onnx ASR/TTS/VAD）
  onnx: models/onnx/

# ── RK3588 NPU 配置 ──────────────────────────────────────────────
npu:
  target: rk3588
  core_mask: 0

# ── 模块配置 ──────────────────────────────────────────────────────
modules:
  vision:
    enabled: true
  audio_input:
    enabled: false
  speech_recognition:
    enabled: false
  brain:
    enabled: false
  speech_synthesis:
    enabled: false
  live2d_display:
    enabled: true
    model_name: Strawberry_Rabbit
    model_path: assets/live2d/Strawberry_Rabbit/Strawberry_Rabbit.model3.json
    manifest_path: assets/live2d/Strawberry_Rabbit/manifest.json

